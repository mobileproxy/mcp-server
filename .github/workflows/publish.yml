name: Publish to npm

# Uses npm OIDC trusted publishing — no NPM_TOKEN required.
# Configure the trust on npmjs.com: package settings → Trusted Publishing →
# Add publisher with org=mobileproxy, repo=mcp-server, workflow=publish.yml.
# Requires npm >= 11.5.1 and Node >= 22.14, hence the explicit npm@latest install.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for OIDC + provenance

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      - name: Upgrade to npm 11+ (required for OIDC)
        run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public --provenance
        # No NODE_AUTH_TOKEN — the npm CLI auto-detects the GitHub OIDC environment.
